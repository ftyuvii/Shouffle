name: Discord Commit Notify

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Fresh GitHub Avatar
        id: avatar
        run: |
          AVATAR_URL=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/${{ github.actor }}" \
            | jq -r '.avatar_url')

          CACHE_BUSTED_URL="${AVATAR_URL}?v=$(date +%s)"

          echo "avatar_url=$CACHE_BUSTED_URL" >> "$GITHUB_OUTPUT"

      - name: Send Discord Webhook
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
          AVATAR_URL: ${{ steps.avatar.outputs.avatar_url }}

        run: |
          payload=$(jq -n \
            --arg actor "$ACTOR" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg msg "$COMMIT_MSG" \
            --arg url "$COMMIT_URL" \
            --arg avatar "$AVATAR_URL" \
            '{
              embeds: [{
                color: 16777215,
                author: {
                  name: $actor,
                  url: ("https://github.com/" + $actor),
                  icon_url: $avatar
                },
                title: "Commit Update",
                description:
                  ("[REPO] `" + $repo + "`\n" +
                   "[BRANCH] `" + $branch + "`\n\n" +
                   $msg + "\n\n" +
                   "[View Commit](" + $url + ")"),
                thumbnail: {
                  url: $avatar
                },
                footer: {
                  text: "GitHub Commit Notification"
                },
                timestamp: now | todate
              }]
            }')

          curl -s \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$payload" \
            "$DISCORD_WEBHOOK"