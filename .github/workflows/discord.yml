name: Discord Commit Notify

on:
push:

jobs:
notify:
runs-on: ubuntu-latest

steps:
  - name: Send Discord Embed
    run: |
      curl -H "Content-Type: application/json" \
      -d "{
        \"embeds\": [{
          \"color\": 5814783,

          \"author\": {
            \"name\": \"${{ github.actor }}\",
            \"icon_url\": \"https://github.com/${{ github.actor }}.png\",
            \"url\": \"https://github.com/${{ github.actor }}\"
          },

          \"description\": \"${{ github.event.head_commit.message }}\n\n[View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\",

          \"thumbnail\": {
            \"url\": \"https://github.com/${{ github.actor }}.png\"
          },

          \"footer\": {
            \"text\": \"${{ github.repository }} • ${{ github.ref_name }}\"
          },

          \"timestamp\": \"${{ github.event.head_commit.timestamp }}\"
        }]
      }" \
      ${{ secrets.DISCORD_WEBHOOK }}