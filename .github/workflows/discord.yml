name: Discord Commit Notify

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Current GitHub Profile Picture
        id: get_pfp
        run: |
          # Real-time fresh avatar URL fetch karne ke liye API call
          AVATAR_URL=$(curl -s "https://api.github.com/users/${{ github.actor }}" | jq -r '.avatar_url')
          echo "pfp_url=$AVATAR_URL" >> $GITHUB_OUTPUT

      - name: Send Discord Webhook
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          AVATAR_URL: ${{ steps.get_pfp.outputs.pfp_url }}

        run: |
          payload=$(jq -n \
            --arg actor "$ACTOR" \
            --arg avatar_url "$AVATAR_URL" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg commit_url "$COMMIT_URL" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            '{
              embeds: [{
                color: FFFFFF,
                author: {
                  name: $actor,
                  icon_url: $avatar_url,
                  url: ("https://github.com/" + $actor)
                },
                description: ("🌸 **New Commit in** `" + $repo + "` [" + $branch + "]\n\n" + $commit_msg + "\n\n✨ [View Commit](" + $commit_url + ")"),
                thumbnail: {
                  url: $avatar_url
                }
              }]
            }')

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "$payload" \
            "$DISCORD_WEBHOOK"